name: gully_cricket
description: Gully Cricket.
publish_to: 'none'
version: 1.0.1+3

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  go_router: ^13.0.0
  hive_flutter: ^1.1.0
  shelf: ^1.4.0
  shelf_web_socket: ^2.0.0
  web_socket_channel: ^2.4.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.0.0
  gap: ^3.0.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  haptic_feedback: ^0.5.0
  audioplayers: ^6.0.0
  uuid: ^4.3.0
  network_info_plus: ^5.0.0
  google_mobile_ads: ^5.1.0
  connectivity_plus: ^6.0.0
  intl: ^0.19.0
  fl_chart: ^0.68.0
  share_plus: ^9.0.0
  flutter_local_notifications: ^17.0.0
  flutter_foreground_task: ^8.0.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_logo.png
    - assets/sounds/four.mp3
    - assets/sounds/six.mp3
    - assets/sounds/wicket.mp3
    - assets/sounds/crowd.mp3
